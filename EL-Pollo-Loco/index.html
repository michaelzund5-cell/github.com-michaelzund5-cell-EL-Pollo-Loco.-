<!DOCTYPE html>
<html lang="en" translate="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Pollo Loco</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/classes/drawable-object.class.js" defer></script>
    <script src="./js/classes/moveable-object.class.js" defer></script>
    <script src="./js/classes/sound-manager.class.js" defer></script>

    <script src="./js/classes/status-bar.class.js" defer></script>
    <script src="./js/classes/coin-status-bar.class.js" defer></script>
    <script src="./js/classes/bottle-status-bar.class.js" defer></script>
    <script src="./js/classes/endboss-status-bar.class.js" defer></script>
    <script src="./js/classes/background-object.class.js" defer></script>
    <script src="./js/classes/cloud.class.js" defer></script>

    <script src="./js/classes/character.class.js" defer></script>
    <script src="./js/classes/chicken.class.js" defer></script>
    <script src="./js/classes/baby-chicken.class.js" defer></script>
    <script src="./js/classes/endboss.class.js" defer></script>

    <script src="./js/classes/keyboard.class.js" defer></script>
    <script src="./js/classes/throwable-object.class.js" defer></script>
    <script src="./js/classes/bottle.class.js" defer></script>
    <script src="./js/classes/coin.class.js" defer></script>
    <script src="./js/classes/level.class.js" defer></script>
    <script src="./js/levels/level1.js" defer></script>

    <script src="./js/classes/world.class.js" defer></script>
    <script src="./js/game.js" defer></script>
    <link rel="icon" href="./assets/img/img_pollo_locco/img/2_character_pepe/5_dead/D-51.png" type="image/png">
</head>

<body onload="init()">
    <main class="page">
        <h1 class="game-title">El Pollo Loco</h1>

        <section class="game-wrapper">
            <canvas id="canvas" width="720" height="480"></canvas>

            <section id="start-screen" class="screen start-screen">
                <div class="screen-content">
                    <button id="start-game-btn" type="button">Start Game</button>
                </div>
            </section>

            <section id="end-screen" class="screen hidden">
                <div class="screen-content">
                    <h2 id="end-screen-title">Game Over</h2>
                    <div class="end-screen-actions">
                        <button type="button" onclick="replayGame()">Restart Game</button>
                        <button type="button" onclick="restartGame()">Main Menu</button>
                    </div>
                </div>
            </section>

            <section id="pause-overlay" class="screen pause-overlay hidden">
                <div class="screen-content">
                    <h2>Paused</h2>
                    <button type="button" onclick="togglePause()">Resume</button>
                </div>
            </section>

            <nav class="game-actions hidden" aria-label="Game actions">
                <button id="fullscreen-btn" type="button">Fullscreen</button>
                <button id="restart-btn" type="button">Main Menu</button>
                <button id="mute-btn" type="button">Mute</button>
                <button id="pause-btn" type="button">Pause</button>
            </nav>

            <section class="mobile-controls hidden" aria-label="Mobile controls">
                <div class="mobile-control-group">
                    <button id="btn-left" type="button">Left</button>
                    <button id="btn-right" type="button">Right</button>
                </div>
                <div class="mobile-control-group">
                    <button id="btn-jump" type="button">Jump</button>
                    <button id="btn-throw" type="button">Throw</button>
                </div>
            </section>
        </section>

        <section class="controls-info">
            <span><kbd>A</kbd> Move left</span>
            <span><kbd>D</kbd> Move right</span>
            <span><kbd>Space</kbd> Jump</span>
            <span><kbd>K</kbd> Throw</span>
        </section>

        <button id="imprint-btn" type="button" class="imprint-link" onclick="openImprint()">Imprint</button>
    </main>

    <div id="rotate-overlay" class="rotate-overlay">
        <div class="rotate-content">
            <div class="rotate-icon">📱</div>
            <p>Please rotate your device to landscape mode to play.</p>
        </div>
    </div>

    <section id="imprint-modal" class="screen hidden">
        <div class="screen-content imprint-content">
            <h2>Imprint</h2>
            <p><strong>Michael Zünd</strong><br>
            Developer Academy Project – El Pollo Loco<br>
            <span class="address-placeholder">[Add your full postal address here]</span><br>
            Contact: <a href="mailto:michi.zuend99@hotmail.com">michi.zuend99@hotmail.com</a></p>
            <button type="button" onclick="closeImprint()">Close</button>
        </div>
    </section>
</body>

</html>
